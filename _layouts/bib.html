<div class="publication-item">

  <!-- Titre -->
  <p class="pub-title">
    <strong>{{ entry.title }}</strong>
  </p>

  <!-- Auteurs -->
  <p class="pub-authors">
    {{ entry.author }}
  </p>

  <!-- Journal + date -->
  <p class="pub-venue">
    {{ entry.journal }}, {{ entry.month | capitalize }} {{ entry.year }}
  </p>

  <!-- Bouton DOI -->
  {% if entry.doi %}
  <a href="https://doi.org/{{ entry.doi }}" target="_blank" class="doi-button">
    DOI
  </a>
  {% endif %}

</div>
